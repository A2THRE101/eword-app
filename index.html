<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4f6f3" />
    <title>Eword Mobile Preview 0.2.1</title>
    <link rel="manifest" href="./manifest.json?v=0.2.1" />
    <link rel="stylesheet" href="./styles.css?v=0.2.1" />
  </head>
  <body>
    <main class="preview-shell">
      <section class="phone" aria-label="Eword mobile visual preview">
        <header class="app-header">
          <div>
            <p class="eyebrow">Eword Mobile 0.2.1</p>
            <h1 id="screenTitle">Дашборд</h1>
          </div>
          <button class="icon-button" id="syncButton" type="button" title="Синхронизация" aria-label="Синхронизация">↻</button>
        </header>

        <section class="screen active" id="dashboardScreen" data-screen="dashboard">
          <div class="balance-band">
            <span>Чистая позиция</span>
            <strong id="netPosition">0 ₽</strong>
            <p id="syncState">Синхронизировано только что</p>
          </div>

          <div class="metric-grid" aria-label="Текущие обязательства">
            <button class="metric-tile" type="button" data-open-filter="lent">
              <span>Мне должны</span>
              <strong id="lentTotal">0 ₽</strong>
            </button>
            <button class="metric-tile" type="button" data-open-filter="borrowed">
              <span>Я должен</span>
              <strong id="borrowedTotal">0 ₽</strong>
            </button>
            <button class="metric-tile urgent" type="button" data-open-filter="overdue">
              <span>Просрочено</span>
              <strong id="overdueTotal">0 ₽</strong>
            </button>
            <button class="metric-tile" type="button" data-screen-target="confirmations">
              <span>На подтверждении</span>
              <strong id="pendingCount">0</strong>
            </button>
          </div>

          <section class="section-block">
            <div class="section-title">
              <h2>Ближайшие действия</h2>
              <button class="text-button" type="button" data-screen-target="journal">Все</button>
            </div>
            <div class="stack-list" id="actionList"></div>
          </section>
        </section>

        <section class="screen" id="journalScreen" data-screen="journal">
          <div class="controls">
            <div class="type-tabs" role="tablist" aria-label="Типы долгов">
              <button class="chip active" type="button" data-filter="all">Все</button>
              <button class="chip" type="button" data-filter="lent">Я дал</button>
              <button class="chip" type="button" data-filter="borrowed">Я взял</button>
              <button class="chip" type="button" data-filter="pending">Ждут</button>
              <button class="chip" type="button" data-filter="closed">Закрытые</button>
            </div>
            <label class="sort-control">
              <span>Сортировка</span>
              <select id="sortSelect">
                <option value="due">По сроку</option>
                <option value="amount">По сумме</option>
                <option value="created">По дате</option>
                <option value="status">По статусу</option>
              </select>
            </label>
          </div>
          <div class="stack-list journal-list" id="journalList"></div>
          <p class="empty-state" id="journalEmpty">Записей по этому фильтру нет.</p>
        </section>

        <section class="screen" id="confirmationsScreen" data-screen="confirmations">
          <div class="notice">
            <strong>Подтверждения второй стороны</strong>
            <span>Займы и платежи становятся финальными после согласия обоих участников.</span>
          </div>
          <div class="stack-list" id="confirmationList"></div>
        </section>

        <section class="screen" id="profileScreen" data-screen="profile">
          <div class="profile-block">
            <div class="profile-avatar">М</div>
            <div>
              <h2>Мурад</h2>
              <p>Аккаунт синхронизирован между iOS и Android</p>
            </div>
          </div>
          <div class="settings-list">
            <button type="button"><span>Валюта по умолчанию</span><strong>RUB</strong></button>
            <button type="button"><span>Push-напоминания</span><strong>Вкл</strong></button>
            <button type="button"><span>Вход</span><strong>Телефон / email</strong></button>
            <button type="button"><span>Экспорт данных</span><strong>JSON</strong></button>
          </div>
        </section>

        <nav class="bottom-nav" aria-label="Навигация">
          <button class="active" type="button" data-screen-target="dashboard"><span>⌂</span>Дашборд</button>
          <button type="button" data-screen-target="journal"><span>≡</span>Журнал</button>
          <button type="button" data-screen-target="confirmations"><span>✓</span>Запросы</button>
          <button type="button" data-screen-target="profile"><span>○</span>Профиль</button>
        </nav>
      </section>
    </main>

    <template id="loanRowTemplate">
      <article class="loan-row">
        <div class="row-main">
          <div class="row-avatar"></div>
          <div class="row-copy">
            <h3></h3>
            <p></p>
            <div class="row-meta"></div>
          </div>
        </div>
        <div class="row-side">
          <strong></strong>
          <span class="status-pill"></span>
        </div>
      </article>
    </template>

    <template id="confirmationTemplate">
      <article class="confirm-row">
        <div>
          <span class="request-type"></span>
          <h3></h3>
          <p></p>
        </div>
        <div class="confirm-actions">
          <button type="button" data-action="decline">Нет</button>
          <button type="button" data-action="approve">Да</button>
        </div>
      </article>
    </template>

    <script src="./app.js?v=0.2.1" defer></script>
  </body>
</html>
