<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f4ee" />
    <title>Eword App 1.0.1</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Версия 1.0.1</p>
          <h1>Eword</h1>
        </div>
        <button class="icon-button" id="resetDemo" type="button" aria-label="Сбросить демо-данные" title="Сбросить">↺</button>
      </header>
      <main>
        <section class="summary-panel" aria-label="Сводка долгов">
          <div class="summary-row primary"><span>Вам должны</span><strong id="totalConfirmed">0 ₽</strong></div>
          <div class="divider"></div>
          <div class="summary-row muted"><span>Неподтверждено</span><strong id="totalPending">0 ₽</strong></div>
        </section>
        <section class="quick-add" aria-label="Добавить долг">
          <form id="debtForm">
            <label><span>Кто должен</span><input id="personInput" name="person" type="text" placeholder="Например, Азиз" autocomplete="off" required /></label>
            <label><span>Сумма</span><input id="amountInput" name="amount" type="number" min="1" step="1" placeholder="3000" required /></label>
            <label class="wide"><span>Комментарий</span><input id="noteInput" name="note" type="text" placeholder="За доставку, обед, перевод" autocomplete="off" /></label>
            <div class="segmented wide" role="group" aria-label="Статус долга">
              <label><input type="radio" name="status" value="confirmed" checked /><span>Подтверждено</span></label>
              <label><input type="radio" name="status" value="pending" /><span>Ждёт подтверждения</span></label>
            </div>
            <button class="submit-button wide" type="submit">Добавить</button>
          </form>
        </section>
        <section class="content-section">
          <div class="section-heading">
            <h2>Долги</h2>
            <div class="tabs" role="tablist" aria-label="Фильтр долгов">
              <button class="tab active" type="button" data-filter="all">Все</button>
              <button class="tab" type="button" data-filter="confirmed">Подтверждено</button>
              <button class="tab" type="button" data-filter="pending">Ожидают</button>
            </div>
          </div>
          <div class="debt-list" id="debtList"></div>
          <p class="empty-state" id="emptyState">Пока долгов нет. Добавьте первый через форму выше.</p>
        </section>
      </main>
    </div>
    <template id="debtTemplate">
      <article class="debt-item">
        <div class="debt-main"><div class="avatar"></div><div><h3></h3><p></p></div></div>
        <div class="debt-side"><strong></strong><span class="status-pill"></span><div class="item-actions"><button type="button" data-action="toggle"></button><button type="button" data-action="delete" aria-label="Удалить">×</button></div></div>
      </article>
    </template>
    <script src="./app.js" defer></script>
  </body>
</html>
